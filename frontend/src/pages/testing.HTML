<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Chat con Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; }
    #chat { width: 400px; height: 500px; border: 1px solid #ccc; overflow-y: auto; padding: 10px; background: white; }
    .msg { margin: 5px 0; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>
  <div id="chat"></div>
  <input type="text" id="input" placeholder="Escribe un mensaje...">
  <button onclick="sendMessage()">Enviar</button>

  <script>
    const socket = new WebSocket("ws://localhost:8000/ws/chat");
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");

    socket.onopen = () => {
      addMessage("Sistema", "Conectado al servidor ✅");
    };

    socket.onmessage = (event) => {
      addMessage("Bot", event.data, "bot");
    };

    function sendMessage() {
      const message = input.value;
      if (message.trim() === "") return;
      socket.send(message);
      addMessage("Tú", message, "user");
      input.value = "";
    }

    function addMessage(sender, message, type="") {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerHTML = `<b>${sender}:</b> ${message}`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight; // auto scroll
    }
  </script>
</body>
</html>
